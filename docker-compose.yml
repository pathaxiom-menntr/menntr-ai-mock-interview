services:
  livekit:
    image: livekit/livekit-server:latest
    container_name: interviewlab_livekit
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    environment:
      # Format must be exactly "key: secret" (space after colon) or the server exits — see livekit logs
      # Secret must be >= 32 chars; must match LIVEKIT_API_* on api/agent
      LIVEKIT_KEYS: "devkey: dev_local_development_secret_32chars_min__"
    # Local Docker Desktop dev: use numeric loopback node IP to avoid address rewrite parsing errors.
    command: ["--bind", "0.0.0.0", "--udp-port", "7882", "--node-ip", "127.0.0.1"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:7880/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  db:
    image: postgres:16-alpine
    container_name: interviewlab_db
    environment:
      POSTGRES_USER: interviewlab
      POSTGRES_PASSWORD: interviewlab_dev
      POSTGRES_DB: interviewlab
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interviewlab"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: interviewlab_redis
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: interviewlab_api
    ports:
      - "8003:8000"
    user: "0:0"  # Run as root to access Docker socket (for sandbox)
    environment:
      DATABASE_URL: postgresql://interviewlab:interviewlab_dev@db:5432/interviewlab
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AZURE_SPEECH_KEY: ${AZURE_SPEECH_KEY}
      AZURE_SPEECH_REGION: ${AZURE_SPEECH_REGION}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-dev_local_development_secret_32chars_min__}
      LIVEKIT_URL: ws://livekit:7880
      LIVEKIT_WS_URL: ws://localhost:7880
      UPLOAD_DIR: /app/uploads
    volumes:
      - ./uploads:/app/uploads
      - ./src:/app/src
      - ./assets:/app/assets
      # Docker socket for sandbox (development only - use separate service in production)
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      livekit:
        condition: service_healthy
    # Note: --reload is disabled in Docker to avoid memory issues with file watchers
    # For development with hot reload, run uvicorn locally: uvicorn src.main:app --reload
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000
    deploy:
      resources:
        limits:
          memory: 1g

  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: interviewlab_agent
    user: "0:0"  # Run as root to access Docker socket (for sandbox)
    environment:
      DATABASE_URL: postgresql://interviewlab:interviewlab_dev@db:5432/interviewlab
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AZURE_SPEECH_KEY: ${AZURE_SPEECH_KEY}
      AZURE_SPEECH_REGION: ${AZURE_SPEECH_REGION}
      OPENAI_TTS_MODEL: ${OPENAI_TTS_MODEL:-tts-1-hd}
      OPENAI_TTS_VOICE: ${OPENAI_TTS_VOICE:-alloy}
      LIVEKIT_URL: ws://livekit:7880
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-dev_local_development_secret_32chars_min__}
      LIVEKIT_WS_URL: ws://livekit:7880
    volumes:
      - ./src:/app/src
      # Docker socket for sandbox (development only - use separate service in production)
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      livekit:
        condition: service_healthy
    command: ["python", "-m", "src.agents.interview_agent", "start"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 3g

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8003
        NEXT_PUBLIC_LIVEKIT_URL: ws://localhost:7880
    container_name: interviewlab_frontend
    ports:
      # Set FRONTEND_PORT in .env if 3000 is already in use (e.g. local npm run dev)
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:

